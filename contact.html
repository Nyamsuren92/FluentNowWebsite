  <link rel="stylesheet" href="style.css" />
  <script src="script.js"></script>
</head>

<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <h2 class="logo">FluentNow</h2>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Lessons</a></li>

      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <a href="#" class="btn small">Sign up</a>
  </nav>
</header>

<!-- CONTACT -->
<section class="contact-wrapper">
  <div class="contact-section">

    <h2>Contact Us</h2>
    <p>We’d love to hear from you. Fill out the form below and we’ll get back to you shortly.</p>

    <form class="contact-form">

      <div class="form-group">
        <input type="text" required placeholder=" " />
        <label>Full Name</label>
      </div>

      <div class="form-group">
        <input type="email" required placeholder=" " />
        <label>Email Address</label>
      </div>

      <div class="form-group">
        <input type="text" placeholder=" " />
        <label>Subject</label>
      </div>

      <div class="form-group">
        <textarea required placeholder=" "></textarea>
        <label>Message</label>
      </div>

      <button type="submit">Send Message</button>

    </form>

  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 FluentNow. All rights reserved.</p>
</footer>

</body>
</html>
